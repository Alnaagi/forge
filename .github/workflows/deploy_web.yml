name: Deploy Flutter Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE_HREF: /${{ github.event.repository.name }}/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Flutter web
        run: |
          flutter build web \
            --release \
            --base-href="${{ env.PAGES_BASE_HREF }}" \
            --pwa-strategy=none \
            --no-wasm-dry-run \
            --dart-define=FORGE_SUPABASE_URL="${{ secrets.FORGE_SUPABASE_URL }}" \
            --dart-define=FORGE_SUPABASE_PUBLISHABLE_KEY="${{ secrets.FORGE_SUPABASE_PUBLISHABLE_KEY }}"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
